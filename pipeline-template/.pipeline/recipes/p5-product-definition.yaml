phase: "P5"
required_skills:
  - $deliver-prd
  - $deliver-user-stories
  - $deliver-acceptance-criteria
  - $deliver-edge-cases
  - $measure-instrumentation-spec
  - $utility-pm-critic
non_skill_process:
  - "In the PRD, include explicit Non-goals (what this product will intentionally NOT do) and a Feature-add bar: every P0/P1 requirement must cite the concrete user evidence that justifies it (ask: real user signal, or founder enthusiasm?). Confirm each requirement traces to the problem the validation evidence revealed, not the one assumed at P1."
  - Run $utility-pm-critic in a fresh context against the completed PRD artifact.
  - "After defining instrumentation, ask: what would a skeptic say about these numbers? Set honest pre-launch targets (e.g. Day-7 / Day-30 retention) now, not after launch."
  - pipeline gate request product --confidence <high|medium|low> --rationale "<grounded in open assumptions and risks>"
required_context:
  - ".pipeline/state/pipeline-state.yaml"
  - ".pipeline/state/assumption-register.yaml"
  - ".pipeline/state/risk-register.yaml"
outputs:
  - docs/20-product/prd.md
  - docs/20-product/pm-critic-report.md
completion_commands:
  - python .pipeline/scripts/pipeline.py stage complete P5
  - python .pipeline/scripts/pipeline.py gate request product
post_skill_verification:
  required: true
  fallback: "Read the vendored SKILL.md directly if explicit skill invocation did not load."
