phase: "P7"
required_skills: []
conditional_skills:
  - name: $prd-to-speckit-handoff
    when: "Use only when the Specify Packet is missing, stale, the PRD was re-approved, or traceability validation fails."
external_tools:
  - speckit.specify
  - speckit.clarify
  - speckit.checklist
  - speckit.plan
  - speckit.tasks
  - speckit.analyze
required_context:
  - ".pipeline/state/pipeline-state.yaml"
  - ".pipeline/state/assumption-register.yaml"
  - ".pipeline/state/risk-register.yaml"
outputs:
  - docs/30-architecture/specify-packets/<feature>.yaml
completion_commands:
  - python .pipeline/scripts/pipeline.py stage complete P7
post_skill_verification:
  required: true
  fallback: "Read the vendored SKILL.md directly if explicit skill invocation did not load."
