phase: "P2"
required_skills:
  - $market-research
  - $business-investment-advisor
conditional_skills:
  - name: $financial-analyst
    when: "Use only when real revenue, cost, cash-flow, budget, or forecast data exists."
required_context:
  - ".pipeline/state/pipeline-state.yaml"
  - ".pipeline/state/assumption-register.yaml"
  - ".pipeline/state/risk-register.yaml"
non_skill_process:
  - "Within $idea2product-p2-strategy-analysis, first perform the existing-solutions scan, write docs/10-strategy/existing-solutions-scan.md, and collect a non-pending User Decision before deeper strategy analysis."
  - "Run $assumption-challenger as a REQUIRED red-team / pre-mortem on the strategy before completing P2. Argue against building; record the strongest counter-argument and the riskiest load-bearing assumption (with its cheapest test) into the registers."
outputs:
  - docs/10-strategy/existing-solutions-scan.md
  - docs/10-strategy/strategy-research-note.md
completion_commands:
  - python .pipeline/scripts/pipeline.py stage complete P2
post_skill_verification:
  required: true
  fallback: "Read the vendored SKILL.md directly if explicit skill invocation did not load."
