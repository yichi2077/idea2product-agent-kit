phase: "P9"
required_skills:
  - $executing-plans
  - $test-driven-development
  - $verification-before-completion
  - $requesting-code-review
  - $receiving-code-review
  - $deliver-launch-checklist
  - $finishing-a-development-branch
conditional_skills:
  - name: $systematic-debugging
    when: "Use only when tests fail, a bug appears, or behavior differs from expectation."
non_skill_process:
  - "Recommended before Release Gate (the minimum responsible threshold per the playbook): run a security review covering auth/session, API response info-leakage, input validation/injection, and dependencies with known CVEs — agentic coding generates code that works, not code that is inherently secure. Record findings in docs/40-delivery/."
  - Run Playwright and CI verification before Release Gate.
  - pipeline gate request release --confidence <high|medium|low> --rationale "<grounded in open assumptions and risks>"
required_context:
  - ".pipeline/state/pipeline-state.yaml"
  - ".pipeline/state/assumption-register.yaml"
  - ".pipeline/state/risk-register.yaml"
outputs:
  - docs/40-delivery/acceptance-results.md
  - docs/40-delivery/release-decision.md
completion_commands:
  - python .pipeline/scripts/pipeline.py stage complete P9
  - python .pipeline/scripts/pipeline.py gate request release
post_skill_verification:
  required: true
  fallback: "Read the vendored SKILL.md directly if explicit skill invocation did not load."
