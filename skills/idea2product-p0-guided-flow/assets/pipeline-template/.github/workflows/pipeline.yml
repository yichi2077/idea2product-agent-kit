name: pipeline
on:
  push:
  pull_request:
  schedule:
    - cron: "17 3 * * 1"
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python .pipeline/scripts/audit_skills.py
      - run: python .pipeline/scripts/detect_trigger_conflicts.py
      - run: python -m pytest .pipeline/tests -q
      - run: python .pipeline/scripts/review_due.py || true
