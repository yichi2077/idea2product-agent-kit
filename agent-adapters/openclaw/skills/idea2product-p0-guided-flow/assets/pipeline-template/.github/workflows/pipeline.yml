name: pipeline
on:
  push:
  pull_request:
  schedule:
    - cron: "17 3 * * 1"
jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -r .pipeline/requirements-dev.txt
      - run: sh .pipeline/scripts/verify.sh
      - run: python .pipeline/scripts/review_due.py || true
  verify-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r .pipeline/requirements-dev.txt
      - shell: powershell
        run: .\.pipeline\scripts\verify.ps1
