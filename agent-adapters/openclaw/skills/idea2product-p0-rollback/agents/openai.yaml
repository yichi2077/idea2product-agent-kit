interface:
  display_name: "idea2product-P0-rollback"
  short_description: "Roll the idea-to-product pipeline back to an earlier completed phase using the reopen command — only after confirming the target phase, the affected reports, and the reason with the user; never reopen without explicit confirmation."
  default_prompt: "Use $idea2product-p0-rollback to roll a completed phase back."
policy:
  allow_implicit_invocation: false
